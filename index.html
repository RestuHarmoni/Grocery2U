/* v1.3.16 Animated live progress */
@keyframes g2uPulseGlow{0%,100%{box-shadow:0 12px 26px rgba(22,163,74,.18), inset 0 0 0 rgba(255,255,255,0)}50%{box-shadow:0 18px 42px rgba(34,197,94,.38), inset 0 0 28px rgba(255,255,255,.08)}}
@keyframes g2uShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(230%)}}
@keyframes g2uRingSpin{0%{filter:drop-shadow(0 0 0 rgba(134,239,172,0));transform:rotate(0deg)}50%{filter:drop-shadow(0 0 14px rgba(134,239,172,.55));transform:rotate(180deg)}100%{filter:drop-shadow(0 0 0 rgba(134,239,172,0));transform:rotate(360deg)}}
@keyframes g2uFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes g2uSpark{0%{left:0;opacity:0}15%{opacity:1}85%{opacity:1}100%{left:calc(100% - 18px);opacity:0}}
@keyframes g2uConfetti{0%{opacity:0;transform:scale(.9) rotate(0deg)}30%{opacity:1}100%{opacity:0;transform:scale(1.08) rotate(8deg)}}
.live-progress-card{position:relative;overflow:hidden;transition:.35s ease;}
.live-progress-card.live-animated{animation:g2uPulseGlow 2.6s ease-in-out infinite;}
.live-progress-card.live-animated:before{content:"";position:absolute;inset:0;background:linear-gradient(115deg,transparent 0%,rgba(255,255,255,.12) 38%,rgba(255,255,255,.28) 50%,rgba(255,255,255,.10) 62%,transparent 100%);transform:translateX(-100%);animation:g2uShimmer 3.4s ease-in-out infinite;pointer-events:none;}
.live-progress-card.is-complete{background:linear-gradient(135deg,#047857,#22c55e);animation:g2uPulseGlow 1.7s ease-in-out infinite;}
.live-progress-card.is-complete:after{content:"🎉 ✦ ✨";position:absolute;right:18px;top:12px;font-size:20px;animation:g2uConfetti 2.2s ease-in-out infinite;}
.live-stage{position:relative;}
.live-stage span{transition:width .65s cubic-bezier(.2,.8,.2,1);position:relative;overflow:visible;}
.live-stage span:after{content:"";position:absolute;right:-5px;top:50%;width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 0 15px rgba(255,255,255,.95),0 0 22px rgba(134,239,172,.9);transform:translateY(-50%);opacity:.95;}
.live-progress-card.live-animated .live-stage span:before{content:"";position:absolute;top:0;bottom:0;width:26px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);animation:g2uSpark 2.1s ease-in-out infinite;}
.progress-ring{position:relative;transition:background .65s ease;}
.live-progress-card.live-animated .progress-ring{animation:g2uRingSpin 5.2s linear infinite;}
.progress-ring b{animation:g2uFloat 2s ease-in-out infinite;}
.live-status-line{display:flex;align-items:center;gap:7px;margin-top:4px;color:rgba(255,255,255,.86);font-size:12px;font-weight:800;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#86efac;box-shadow:0 0 10px #86efac;display:inline-block;}
.live-progress-card.is-complete .progress-ring:before{background:#065f46;}
.live-progress-card.is-complete .progress-ring b{font-size:0;}
.live-progress-card.is-complete .progress-ring b:after{content:"✓";font-size:38px;}
.progress span{transition:width .65s cubic-bezier(.2,.8,.2,1);}

let db=JSON.parse(localStorage.getItem('dapurlist_v11')||'null')||{users:[],families:[],members:[],profiles:[],items:[],lists:[],receipts:[]};
// Migration guard: older cached/localStorage builds may not have the new arrays.
db.users=db.users||[];
db.families=db.families||[];
db.members=db.members||[];
db.profiles=db.profiles||[];
db.items=db.items||[];
db.lists=db.lists||[];
db.receipts=db.receipts||[];

function sid(){return Math.random().toString(36).slice(2,10)}

function sbConfig(){return window.GROCERY2U_SUPABASE||{};}
function sbReady(){const c=sbConfig();return !!(c.url&&c.anonKey&&c.url.includes('supabase.co'));}
async function sbFetch(path, options={}){
  const c=sbConfig();
  const res=await fetch(c.url+path,{...options,headers:{apikey:c.anonKey,Authorization:'Bearer '+c.anonKey,'Content-Type':'application/json',...(options.headers||{})}});
  const text=await res.text();
  let data=null;try{data=text?JSON.parse(text):null}catch(e){data=text}
  if(!res.ok){throw new Error((data&&data.message)||text||('Supabase error '+res.status));}
  return data;
}
async function supaRegisterUser(username,pin,code){
  return await sbFetch('/rest/v1/rpc/grocery2u_register_user_with_access_code',{method:'POST',body:JSON.stringify({p_username:username,p_pin_hash:pin,p_full_name:username,p_code:normalizeAccessCode(code)})});
}
async function supaLoginUser(username,pin){
  const q='/rest/v1/app_users?select=id,username,full_name,created_at,access_code,password_reset_required&username=eq.'+encodeURIComponent(username)+'&pin_hash=eq.'+encodeURIComponent(pin)+'&limit=1';
  const rows=await sbFetch(q,{method:'GET'});
  return Array.isArray(rows)?rows[0]:null;

async function supaLoadShoppingLists(familyId){
  if(!sbReady() || !familyId) return;
  const listRows=await sbFetch('/rest/v1/shopping_lists?select=id,family_id,title,created_by_user_id,created_by_profile_id,assigned_to_profile_id,status,created_at,completed_at&family_id=eq.'+encodeURIComponent(familyId)+'&order=created_at.desc',{method:'GET'});
  const lists=(Array.isArray(listRows)?listRows:[]).map(l=>({
    id:l.id,
    familyId:l.family_id,
    title:l.title,
    createdBy:l.created_by_user_id,
    createdByProfileId:l.created_by_profile_id,
    assignedToProfileId:l.assigned_to_profile_id,
    status:l.status||'draft',
    items:[],
    createdAt:l.created_at,
    completedAt:l.completed_at
  }));
  if(lists.length){
    const ids=lists.map(l=>l.id);
    const itemRows=await sbFetch('/rest/v1/shopping_list_items?select=id,list_id,item_name,category_name,quantity,note,status,replacement_name,replacement_note,unavailable_reason,unavailable_note,updated_at&list_id=in.('+ids.join(',')+')&order=updated_at.asc',{method:'GET'});
    const items=Array.isArray(itemRows)?itemRows:[];
    lists.forEach(l=>{
      l.items=items.filter(i=>i.list_id===l.id).map(i=>({
        id:i.id,
        itemId:null,
        name:i.item_name,
        category:i.category_name,
        unit:i.quantity||'',
        status:i.status||'requested',
        note:i.note||'',
        replacement:i.replacement_name||'',
        replacementNote:i.replacement_note||'',
        unavailableReason:i.unavailable_reason||'',
        unavailableNote:i.unavailable_note||''
      }));
    });
  }
  db.lists=(db.lists||[]).filter(l=>l.familyId!==familyId).concat(lists);
  save();
}

function normalizeAccessCode(v){return String(v||'').toUpperCase().replace(/\s+/g,'').replace(/[^A-Z0-9-]/g,'').replace(/^RH([A-Z0-9]{6})$/,'RH-$1')}
function isValidRHCode(code){return /^RH-[A-Z0-9]{6}$/.test(normalizeAccessCode(code));}
function getAccessData(){try{const raw=JSON.parse(localStorage.getItem('grocery2u_access_data')||'null')||{codes:[]};const codes=(raw.codes||[]).filter(c=>isValidRHCode(c.code)).map(c=>({id:c.id||sid(),code:normalizeAccessCode(c.code),campaignName:c.campaignName||c.campaign_name||'RH Follower Campaign',maxFamily:Number(c.maxFamily||c.max_family||50),usedCount:Number(c.usedCount||c.used_count||0),usedUsers:Array.isArray(c.usedUsers)?c.usedUsers:[],status:c.status==='disabled'?'disabled':'active',createdAt:c.createdAt||c.created_at||new Date().toISOString()}));const data={codes};localStorage.setItem('grocery2u_access_data',JSON.stringify(data));return data}catch(e){return{codes:[]}}}
function saveAccessData(data){localStorage.setItem('grocery2u_access_data',JSON.stringify({codes:data.codes||[]}));}
function validateAccessCode(raw, username){const code=normalizeAccessCode(raw);const data=getAccessData();const row=data.codes.find(c=>normalizeAccessCode(c.code)===code);if(!row)return{ok:false,msg:'Access Code tidak sah. Minta kod RH daripada admin/follower campaign.'};if(row.status==='disabled')return{ok:false,msg:'Access Code tidak aktif.'};if((row.usedCount||0)>=(row.maxFamily||50))return{ok:false,msg:'Access Code telah mencapai had penggunaan.'};row.usedCount=(row.usedCount||0)+1;row.usedUsers=row.usedUsers||[];row.usedUsers.push({username,usedAt:new Date().toISOString()});saveAccessData(data);return{ok:true,code}}
async function registerUserWithCode(){
  const u=document.getElementById('loginUsername').value.trim().toLowerCase();
  const pin=document.getElementById('loginPin').value.trim();
  const code=document.getElementById('accessCode').value.trim();
  if(!u||!pin)return alert('Masukkan username dan password.');
  if(pin.length<4)return alert('Password sekurang-kurangnya 4 aksara.');
  if(!isValidRHCode(code))return alert('Kod akses mesti format RH-XXXXXX.');
  if(db.users.find(x=>x.username===u))return alert('Username sudah wujud. Sila login.');
  let supaUserId=null;
  if(sbReady()){
    try{
      const result=await supaRegisterUser(u,pin,code);
      supaUserId=(result&&result.user_id)||null;
    }catch(e){
      alert('Daftar gagal di Supabase: '+e.message);
      return;
    }
  }else{
    const valid=validateAccessCode(code,u);
    if(!valid.ok)return alert(valid.msg);
  }
  const normalized=normalizeAccessCode(code);
  const user={id:supaUserId||sid(),username:u,pin,fullName:u,createdAt:new Date().toISOString(),status:'active',accessCode:normalized};
  db.users.push(user);
  seedItems.forEach(i=>db.items.push({id:sid(),ownerUserId:user.id,category:i[0],name:i[1],unit:i[2],active:true}));
  save();
  session={userId:user.id,familyId:null,profileId:null};
  localStorage.setItem('dapurlist_session',JSON.stringify(session));
  alert('Akaun berjaya didaftar dengan kod '+normalized);
  boot();
}

async function setStatus(listId,rowId,status){
  const list=db.lists.find(x=>x.id===listId); if(!list)return;
  const row=list.items.find(i=>i.id===rowId); if(!row)return;
  const extra={};
  if(status==='replaced'){
    const replacement=prompt('Ganti dengan barang apa?',row.replacement||'');
    if(!replacement || !replacement.trim()) return alert('Sila tulis nama barang ganti.');
    const replacementNote=prompt('Nota sebab ganti barang?',row.replacementNote||'');
    if(!replacementNote || !replacementNote.trim()) return alert('Sila tulis nota sebab ganti barang.');
    extra.replacement=replacement.trim();
    extra.replacementNote=replacementNote.trim();
  }
  if(status==='unavailable'){
    const reason=prompt('Sebab barang tiada? Contoh: Habis stok / Tiada jenama / Tiada saiz',row.unavailableReason||'Habis stok');
    if(!reason || !reason.trim()) return alert('Sila tulis sebab barang tiada.');
    const note=prompt('Catatan ringkas untuk penghantar?',row.unavailableNote||'');
    if(!note || !note.trim()) return alert('Sila tulis catatan ringkas.');
    extra.unavailableReason=reason.trim();
    extra.unavailableNote=note.trim();
  }
  if(sbReady()){
    try{ await supaUpdateShoppingItem(rowId,status,extra); }
    catch(e){ alert('Gagal update status di Supabase: '+e.message); return; }
  }
  row.status=status;
  if(['sent','accepted'].includes(list.status)){
    if(sbReady()){ try{ await supaUpdateShoppingListStatus(list.id,'shopping'); }catch(e){ console.warn('Gagal auto update shopping status',e); } }
    list.status='shopping';
  }
  if(status==='replaced'){ row.replacement=extra.replacement; row.replacementNote=extra.replacementNote; }
  if(status==='unavailable'){ row.unavailableReason=extra.unavailableReason; row.unavailableNote=extra.unavailableNote; }
  save();renderLists();renderHome();
}
async function sendList(id){
  const l=db.lists.find(x=>x.id===id); if(!l)return;

function uploadReceipt(){
  if(!fam())return alert('Pilih family dahulu');
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*,application/pdf';
  input.capture='environment';
  input.onchange=()=>{
    const file=input.files&&input.files[0];
    const store=prompt('Nama kedai?','Lotus')||'Kedai';
    const amount=prompt('Jumlah resit RM?','50.00');
    if(!amount)return;
    const reader=new FileReader();
    reader.onload=()=>{
      const id=sid();
      const safeStore=store.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'kedai';
      const ext=file&&file.name.includes('.')?file.name.split('.').pop():'jpg';
      const path=`receipts/family_${fam().id}/${new Date().getFullYear()}/${String(new Date().getMonth()+1).padStart(2,'0')}/receipt_${id}_${safeStore}.${ext}`;
      db.receipts.push({id,familyId:fam().id,amount:Number(amount),payer:session.userId,claimStatus:'unpaid',date:new Date().toISOString(),storeName:store,fileName:file?file.name:`receipt_${id}.jpg`,fileSize:file?file.size:0,fileType:file?file.type:'image/jpeg',fileData:reader.result,storagePath:path,note:'Resit disimpan untuk rekod, claim dan download semula.'});
      save();renderReceipts();renderHome();
    };
    if(file) reader.readAsDataURL(file); else reader.onload();
  };
  input.click();
}

  ${rec.map(r=>`<div class="card receipt-card"><div class="between"><div><h3 class="list-title">${r.storeName||'Resit'} • RM${Number(r.amount).toFixed(2)}</h3><p class="muted">${new Date(r.date).toLocaleDateString('ms-MY')} • dibayar oleh ${db.users.find(u=>u.id===r.payer)?.username||'-'}</p></div><span class="pill ${r.claimStatus==='paid'?'green':'amber'}">${r.claimStatus==='paid'?'Selesai':'Belum Claim'}</span></div>
    <div class="receipt-preview">${r.fileData&&String(r.fileData).startsWith('data:image')?`<img src="${r.fileData}" alt="Resit">`:'<div class="empty">🧾</div>'}</div>
    <div class="receipt-meta"><div class="meta-box"><span class="mini">Fail</span><b>${r.fileName||'receipt.jpg'}</b></div><div class="meta-box"><span class="mini">Saiz</span><b>${fmtBytes(r.fileSize||0)}</b></div></div>
    <p class="muted" style="word-break:break-all">Storage path: ${r.storagePath||'receipts/family_id/yyyy/mm/receipt.jpg'}</p>
    <div class="receipt-actions"><button class="btn small ghost" onclick="downloadReceipt('${r.id}')">⬇️ Download</button><button class="btn small ghost" onclick="shareReceipt('${r.id}')">📤 Share</button>${r.claimStatus==='unpaid'?`<button class="btn small" onclick="markPaid('${r.id}')">Paid</button>`:'<button class="btn small secondary">Paid</button>'}<button class="btn small red" onclick="deleteReceipt('${r.id}')">Delete</button></div></div>`).join('')||'<div class="card"><p class="muted">Belum ada resit.</p></div>'}`
}

boot();
</script>
<script>
  const APP_VERSION = '1.3.16';
  async function registerGrocery2UServiceWorker(){
    if(!('serviceWorker' in navigator)) return;
    try{
      const reg = await navigator.serviceWorker.register('./sw.js?v=' + APP_VERSION);
      if(reg.waiting){ reg.waiting.postMessage({type:'SKIP_WAITING'}); }
      reg.addEventListener('updatefound', () => {
        const worker = reg.installing;
        if(!worker) return;
        worker.addEventListener('statechange', () => {
          if(worker.state === 'installed' && navigator.serviceWorker.controller){
            window.location.reload();
          }
        });
      });
      const res = await fetch('./version.json?v=' + Date.now(), {cache:'no-store'});
      const data = await res.json();
      const saved = localStorage.getItem('grocery2u_app_version');
      if(saved && saved !== data.version){
        localStorage.setItem('grocery2u_app_version', data.version);
        if(navigator.serviceWorker.controller){
          const keys = await caches.keys();
          await Promise.all(keys.filter(k => k.startsWith('grocery2u')).map(k => caches.delete(k)));
          window.location.reload();
        }
      } else {
        localStorage.setItem('grocery2u_app_version', data.version);
      }
    }catch(e){ console.warn('SW update check skipped', e); }
  }
  window.addEventListener('load', registerGrocery2UServiceWorker);
</script>
